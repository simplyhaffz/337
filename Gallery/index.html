    <title>Beyond Dreams Doors</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            overflow: auto; /* Enable scrolling */
        }

        body {
            font-family: courier;
            background-color: #000; /* Set background color to black */
            color: white; /* Set text color to white for better visibility */
        }

        img {
            box-shadow: 0px 0px 7px #fff;
        }

        img:hover {
            border: 0;
            box-shadow: 0 0 5px white, 0 0 7px white, 0 0 20px white;
        }

        body::before {
            content: "";
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(rgba(20, 20, 20, 0) 66%, rgba(0, 0, 0, 0.20) 33%);
            background-size: 100% 3px;
            z-index: 9998;
            pointer-events: none;
            animation: scanlines-anim 0.7s linear infinite;
        }

        @keyframes scanlines-anim {
            0% {
                background-position: 0px 0px;
            }

            100% {
                background-position: 0px 9px;
            }
        }

        /* Prevent image dragging */
        img {
            -webkit-user-drag: none;
            user-drag: none;
        }

        /* Watermark text */
        body::after {
            content: 'Haffz The Queen!';
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            color: rgba(255, 255, 255, 0.55);
            pointer-events: none;
            z-index: 9999;
        }

        /* Login overlay */
        #loginOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        #loginOverlay input {
            padding: 10px;
            font-size: 1.5rem;
            margin-right: 10px;
            border: 1px solid #fff;
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
        }

        #loginOverlay button {
            padding: 10px 20px;
            font-size: 1.5rem;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>

    <script>
        // Function to check for developer tools on page load
        (function() {
            var devtoolsOpen = false;
            const threshold = 160; // Width of developer tools when opened

            setInterval(function() {
                if (window.outerWidth - window.innerWidth > threshold || window.outerHeight - window.innerHeight > threshold) {
                    devtoolsOpen = true;
                }
                if (devtoolsOpen) {
                    // Block access or redirect
                    alert("Developer tools are blocked. Reload the page if accidentally opened.");
                    window.location.href = 'about:blank'; // Redirect to a blank page to block further interaction
                }
            }, 1000); // Check every second
        })();

        // Disable right-click context menu
        document.addEventListener('contextmenu', event => event.preventDefault());

        // Disable image dragging
        document.addEventListener('dragstart', function(event) {
            if (event.target.tagName === 'IMG') {
                event.preventDefault();
            }
        });

        // Prevent text selection
        document.addEventListener('selectstart', function(event) {
            event.preventDefault();
        });

        // Prevent printing
        window.onbeforeprint = function() {
            alert('Printing is disabled on this page.');
            return false; // Prevent printing
        };

        // Password login functionality
        function checkPassword() {
            var password = document.getElementById("password").value;
            if (password === "CuPCaKEs337") { // Replace with your own password
                document.getElementById("loginOverlay").style.display = "none";
            } else {
                alert("Incorrect password");
            }
        }
    </script>
</head>
