<!DOCTYPE html>    
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Beyond Dreams Doors</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            overflow: auto; /* Enable scrolling */
        }

        body {
            font-family: courier;
            background-color: #000; /* Set background color to black */
            color: white; /* Set text color to white for better visibility */
        }

        img {
            box-shadow: 0px 0px 7px #fff;
        }

        img:hover {
            border: 0;
            box-shadow: 0 0 5px white, 0 0 7px white, 0 0 20px white;
        }

        body::before {
            content: "";
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(rgba(20, 20, 20, 0) 66%, rgba(0, 0, 0, 0.20) 33%);
            background-size: 100% 3px;
            z-index: 9998; /* Adjust z-index to make sure it’s below the watermark */
            pointer-events: none;
            animation: scanlines-anim 0.7s linear infinite;
        }

        @keyframes scanlines-anim {
            0% {
                background-position: 0px 0px;
            }

            100% {
                background-position: 0px 9px;
            }
        }

        @media only screen and (orientation: portrait) {
            .navbar {
                font-size: 0.6em;
            }

            body {
                font-size: 32px;
                background-color: #000; /* Ensure background is black in portrait mode */
            }

            a {
                padding: 20px 30px;
            }

            input[type=text] {
                padding: 20px;
                font-size: 1em;
                width: auto;
            }

            body::before {
                background-size: 100% 4px;
            }
        }

        /* Prevent image dragging */
        img {
            -webkit-user-drag: none; /* For WebKit browsers */
            user-drag: none; /* For Firefox */
        }

        /* Watermark text */
        body::after {
            content: 'Haffz The Queen!';
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            color: rgba(255, 255, 255, 0.55);
            pointer-events: none;
            z-index: 9999; /* Ensure watermark is on top */
        }

        /* Login overlay */
        #loginOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8); /* Darker background */
            backdrop-filter: blur(10px); /* Apply blur effect */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        #loginOverlay input {
            padding: 10px;
            font-size: 1.5rem;
            margin-right: 10px;
            border: 1px solid #fff;
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
        }

        #loginOverlay button {
            padding: 10px 20px;
            font-size: 1.5rem;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
    
    <script>
        // Disable right-click context menu
        document.addEventListener('contextmenu', event => event.preventDefault());

        // Disable key combinations for developer tools
        document.addEventListener('keydown', function(event) {
            // Block F12, Ctrl + Shift + I, Ctrl + Shift + C, and Ctrl + U
            if ((event.key === 'F12') || 
                (event.ctrlKey && event.shiftKey && (event.key === 'I' || event.key === 'C')) || 
                (event.ctrlKey && event.key === 'U')) {
                event.preventDefault();
                alert('Developer tools are blocked!');
            }
        });

        // Detect if the devtools are opened and trigger a custom action
        let devtoolsOpen = false;
        setInterval(function() {
            if (window.outerWidth - window.innerWidth > 100 || window.outerHeight - window.innerHeight > 100) {
                devtoolsOpen = true;
            }
            if (devtoolsOpen) {
                alert('Developer tools detected! Reload the page to fix.');
                devtoolsOpen = false;
            }
        }, 1000);

        // Disable text selection
        document.addEventListener('selectstart', function(event) {
            event.preventDefault();
        });

        // Prevent printing
        window.onbeforeprint = function() {
            alert('Printing is disabled on this page.');
            return false; // Prevent printing
        };

        // Password login functionality
        function checkPassword() {
            var password = document.getElementById("password").value;
            if (password === "yourPassword") { // Replace with your own password
                document.getElementById("loginOverlay").style.display = "none";
            } else {
                alert("Incorrect password");
            }
        }
    </script>
</head>

<body oncontextmenu="return false;">
    <div id="loginOverlay">
        <div>
            <h2 style="color: white; font-size: 2rem; text-align: center;">Enter Password</h2>
            <input type="password" id="password" placeholder="Password" />
            <button onclick="checkPassword()">Submit</button>
