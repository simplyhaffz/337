<!DOCTYPE html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" type="image/x-icon" href="com.gif">
    <link rel="stylesheet" href="css/main.css?3">
    <title>Beyond The Dreams</title>

    <style>
        /* General page layout */
        html, body {
            height: 100%;
            margin: 0;
            overflow: auto; /* Enable scrolling */
        }

        body {
            font-family: courier;
            background-color: #000; /* Set background color to black */
            color: white; /* Set text color to white for better visibility */
        }

        img {
            box-shadow: 0px 0px 7px #fff; /* Add a glow effect around images */
        }

        img:hover {
            border: 0;
            box-shadow: 0 0 5px white, 0 0 7px white, 0 0 20px white; /* Enhance the glow on hover */
        }

        /* Scanline effect for the background */
        body::before {
            content: "";
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(rgba(20, 20, 20, 0) 66%, rgba(0, 0, 0, 0.20) 33%);
            background-size: 100% 3px;
            z-index: 9998;
            pointer-events: none;
            animation: scanlines-anim 0.7s linear infinite;
        }

        /* Scanline animation keyframes */
        @keyframes scanlines-anim {
            0% {
                background-position: 0px 0px;
            }
            100% {
                background-position: 0px 9px;
            }
        }

        /* Prevent image dragging */
        img {
            -webkit-user-drag: none;
            user-drag: none;
        }

        /* Watermark text */
        body::after {
            content: 'Haffz The Queen!';
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            color: rgba(255, 255, 255, 0.55);
            pointer-events: none;
            z-index: 9999;
        }

        /* Login overlay styling */
        #loginOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        #loginOverlay input {
            padding: 10px;
            font-size: 1.5rem;
            margin-right: 10px;
            border: 1px solid #fff;
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
        }

        #loginOverlay button {
            padding: 10px 20px;
            font-size: 1.5rem;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>

    <script>
    // Function to check for developer tools on page load
    (function() {
        var devtoolsOpen = false;
        const threshold = 160; // Width of developer tools when opened

        setInterval(function() {
            if (window.outerWidth - window.innerWidth > threshold || window.outerHeight - window.innerHeight > threshold) {
                devtoolsOpen = true;
            }
            if (devtoolsOpen) {
                // Block access or redirect
                alert("Developer tools are blocked. Reload the page if accidentally opened.");
                window.location.href = 'about:blank'; // Redirect to a blank page to block further interaction
            }
        }, 1000); // Check every second
    })();

    // Disable right-click context menu
    document.addEventListener('contextmenu', event => event.preventDefault());

    // Disable image dragging
    document.addEventListener('dragstart', function(event) {
        if (event.target.tagName === 'IMG') {
            event.preventDefault();
        }
    });

    // Prevent text selection
    document.addEventListener('selectstart', function(event) {
        event.preventDefault();
    });

    // Prevent printing
    window.onbeforeprint = function() {
        alert('Printing is disabled on this page.');
        return false; // Prevent printing
    };

    // Password login functionality
    function checkPassword() {
        var password = document.getElementById("password").value;
        if (password === "CuPCaKEs337") { // Replace with your own password
            document.getElementById("loginOverlay").style.display = "none"; // Hide the overlay
        } else {
            alert("Incorrect password"); // Show alert if password is incorrect
        }
    }

    // Block common keyboard shortcuts for developer tools
    document.addEventListener('keydown', function(e) {
        // Ctrl + Shift + I / F12 (Inspect)
        if ((e.ctrlKey && e.shiftKey && e.keyCode === 73) || (e.keyCode === 123)) {
            e.preventDefault();
            alert("Inspect element is blocked.");
        }
        // Ctrl + U (View source)
        if (e.ctrlKey && e.keyCode === 85) {
            e.preventDefault();
            alert("Viewing source is blocked.");
        }
        // Ctrl + Shift + U (For Chrome/Firefox)
        if (e.ctrlKey && e.shiftKey && e.keyCode === 85) {
            e.preventDefault();
            alert("Viewing source is blocked.");
        }
        // Ctrl + Shift + J (Developer tools in console)
        if (e.ctrlKey && e.shiftKey && e.keyCode === 74) {
            e.preventDefault();
            alert("Developer tools are blocked.");
        }
        // Disable screenshotting shortcuts (Windows/Chrome)
        if ((e.ctrlKey && e.keyCode === 44)) {  // Print screen
            e.preventDefault();
            alert("Screenshot is blocked.");
        }
    });

    // Block touch gestures for taking screenshots on mobile devices
    document.addEventListener('touchstart', function(e) {
        // Detect swipe up gesture (common in mobile for screenshots)
        if (e.touches.length > 1) {
            e.preventDefault();  // Prevent gesture
            alert("Taking screenshots is blocked.");
        }
    });

    // Prevent screen recording and screenshots via the "Power + Volume Up" on Android
    window.addEventListener('keydown', function(e) {
        // Blocking screenshot button combinations (Android-specific)
        if (e.key === "VolumeDown" || e.key === "VolumeUp") {
            e.preventDefault();
            alert("Screenshots are disabled.");
        }
    });

    // Block gestures for screenshots in iOS (by preventing screen recording)
    window.addEventListener('touchmove', function(e) {
        // Prevents a screenshot gesture (iOS)
        e.preventDefault();
    });

    // Prevent the use of the "Home" and "Power" buttons for screenshots on mobile devices
    document.addEventListener('visibilitychange', function() {
        if (document.hidden) {
            alert("Screenshots are disabled.");
        }
    });

    // Block print screen (for mobile and desktop)
    window.addEventListener('keydown', function(e) {
        if (e.keyCode === 44 || e.key === "PrintScreen") {
            e.preventDefault();
            alert("Screenshot is blocked.");
        }
    });

    // Prevent right-click screenshotting on mobile devices
    document.addEventListener('contextmenu', function(e) {
        if (e.target.tagName === 'IMG') {
            e.preventDefault();  // Disable right-click on images
            alert("Right-clicking to save images is blocked.");
        }
    });

</script>
