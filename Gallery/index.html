<!DOCTYPE html>    
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" type="image/x-icon" href="com.gif">
    <title>Beyond Dreams Doors</title>
    <style>
        body {
            font-family: courier;
            background-color: #000; /* Set background color to black */
            color: white; /* Set text color to white for better visibility */
        }

        img {
            box-shadow: 0px 0px 7px #fff;
        }

        img:hover {
            border: 0;
            box-shadow: 0 0 5px white, 0 0 7px white, 0 0 20px white;
        }

        body::before {
            content: "";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(20, 20, 20, 0) 66%, rgba(0, 0, 0, 0.20) 33%);
            background-size: 100% 3px;
            z-index: 9999;
            pointer-events: none;
            animation: scanlines-anim 0.7s linear infinite;
        }

        @keyframes scanlines-anim {
            0% {
                background-position: 0px 0px;
            }

            100% {
                background-position: 0px 9px;
            }
        }

        @media only screen and (orientation: portrait) {
            .navbar {
                font-size: 0.6em;
            }

            body {
                font-size: 32px;
                background-color: #000; /* Ensure background is black in portrait mode */
            }

            a {
                padding: 20px 30px;
            }

            input[type=text] {
                padding: 20px;
                font-size: 1em;
                width: auto;
            }

            body::before {
                background-size: 100% 4px;
            }
        }

        /* Prevent image dragging */
        img {
            -webkit-user-drag: none; /* For WebKit browsers */
            user-drag: none; /* For Firefox */
        }

        /* Overlay to discourage screenshots */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            pointer-events: none;
            z-index: 9999;
        }

        /* Watermark text */
        body::before {
            content: 'Haffz The Queen!';
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            color: rgba(255, 255, 255, 0.55);
            pointer-events: none;
            z-index: 9999;
        }
    </style>
    
    <script>
        // Disable right-click context menu
        document.addEventListener('contextmenu', event => event.preventDefault());

        // Disable image dragging
        document.addEventListener('dragstart', function(event) {
            if (event.target.tagName === 'IMG') {
                event.preventDefault();
            }
        });

        // Detect and block developer tools
        let devtoolsOpen = false;
        const element = new Image();
        Object.defineProperty(element, 'id', {
            get() {
                devtoolsOpen = true;
                alert('Developer tools are not allowed!');
                event.preventDefault();
            },
        });
        console.log(element.id);

        setInterval(function() {
            if (devtoolsOpen) {
                alert('Developer tools detected! Reload the page if you accidentally opened them.');
                devtoolsOpen = false;
            }
        }, 1000);

        // Prevent text selection
        document.addEventListener('selectstart', function(event) {
            event.preventDefault();
        });

        // Prevent printing
        window.onbeforeprint = function() {
            alert('Printing is disabled on this page.');
            return false; // Prevent printing
        };
    </script>
</head>
