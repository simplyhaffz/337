<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" type="image/x-icon" href="com.gif">
    <title>Beyond Dreams Doors</title>
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            overflow: auto;
        }

        body {
            font-family: courier;
            background-color: #000;
            color: white;
        }

        img {
            box-shadow: 0px 0px 7px #fff;
        }

        img:hover {
            border: 0;
            box-shadow: 0 0 5px white, 0 0 7px white, 0 0 20px white;
        }

        body::before {
            content: "";
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(rgba(20, 20, 20, 0) 66%, rgba(0, 0, 0, 0.20) 33%);
            background-size: 100% 3px;
            z-index: 1;
            pointer-events: none;
            animation: scanlines-anim 0.7s linear infinite;
        }

        @keyframes scanlines-anim {
            0% {
                background-position: 0px 0px;
            }

            100% {
                background-position: 0px 9px;
            }
        }

        @media only screen and (orientation: portrait) {
            .navbar {
                font-size: 0.6em;
            }

            body {
                font-size: 32px;
            }

            a {
                padding: 20px 30px;
            }

            input[type=text] {
                padding: 20px;
                font-size: 1em;
                width: auto;
            }

            body::before {
                background-size: 100% 4px;
            }
        }

        img {
            -webkit-user-drag: none;
            user-drag: none;
        }

        body::after {
            content: 'Haffz The Queen!';
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            color: rgba(255, 255, 255, 0.55);
            pointer-events: none;
            z-index: 2;
        }

        /* Password overlay style */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px); /* Add blur effect */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .login-box {
            background-color: rgba(0, 0, 0, 0.7); /* Darker background for the login box */
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 15px rgba(255, 255, 255, 0.4);
            text-align: center;
        }

        .login-box input {
            padding: 10px;
            font-size: 1.2rem;
            margin: 10px;
            border: 1px solid #444;
            border-radius: 5px;
            width: 200px;
            background-color: #333;
            color: white;
        }

        .login-box button {
            padding: 10px 20px;
            background-color: #444;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
        }

        .login-box button:hover {
            background-color: #666;
        }
    </style>

    <script>
        // Disable right-click context menu
        document.addEventListener('contextmenu', event => event.preventDefault());

        // Disable image dragging
        document.addEventListener('dragstart', function(event) {
            if (event.target.tagName === 'IMG') {
                event.preventDefault();
            }
        });

        document.addEventListener('selectstart', function(event) {
            event.preventDefault();
        });

        window.onbeforeprint = function() {
            alert('Printing is disabled on this page.');
            return false;
        };

        // Password check function
        function checkPassword() {
            const password = document.getElementById('password').value;
            const correctPassword = 'CuPCaKEs337'; // Replace with your desired password

            if (password === correctPassword) {
                document.getElementById('overlay').style.display = 'none'; // Hide overlay if password is correct
            } else {
                alert('Incorrect password!');
            }
        }
    </script>
</head>

<body oncontextmenu="return false;">
    <!-- Password overlay -->
    <div class="overlay" id="overlay">
        <div class="login-box">
            <h2>Enter Password</h2>
            <input type="password" id="password" placeholder="Password" />
            <button onclick="checkPassword()">Login</button>
        </div>
    </div>
