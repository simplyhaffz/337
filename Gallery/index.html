<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" type="image/x-icon" href="com.gif">
    <link rel="stylesheet" href="css/main.css?3">
    <title>Beyond Dreams Doors</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            overflow: auto;
        }

        body {
            font-family: courier;
            background-color: #000;
            color: white;
        }

        img {
            box-shadow: 0px 0px 7px #fff;
        }

        img:hover {
            border: 0;
            box-shadow: 0 0 5px white, 0 0 7px white, 0 0 20px white;
        }

        body::before {
            content: "";
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(rgba(20, 20, 20, 0) 66%, rgba(0, 0, 0, 0.20) 33%);
            background-size: 100% 3px;
            z-index: 9998;
            pointer-events: none;
            animation: scanlines-anim 0.7s linear infinite;
        }

        @keyframes scanlines-anim {
            0% {
                background-position: 0px 0px;
            }

            100% {
                background-position: 0px 9px;
            }
        }

        img {
            -webkit-user-drag: none;
            user-drag: none;
        }

        body::after {
            content: 'Haffz The Queen!';
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            color: rgba(255, 255, 255, 0.55);
            pointer-events: none;
            z-index: 9999;
        }

        #loginOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        #loginOverlay input {
            padding: 10px;
            font-size: 1.5rem;
            margin-right: 10px;
            border: 1px solid #fff;
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
        }

        #loginOverlay button {
            padding: 10px 20px;
            font-size: 1.5rem;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        #imageContainer {
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* 5 images per row */
            gap: 20px;
            margin: 20px auto;
            justify-content: center;
        }

        #imageContainer img {
            border: darkgrey solid 1px;
            max-width: 100%;
            height: auto;
        }

        .largeImage {
            width: 615px;
            height: 550px;
        }

        #welcomeMessage {
            text-align: center;
            font-size: 2.5rem;
            color: white;
            margin: 20px 0;
        }

        .secondRowContainer {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        .secondRowContainer img {
            margin-right: 20px; /* Add a gap between dln6 and dln7 */
        }

        .singleImageRow {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
    </style>

    <script>
        (function() {
            var devtoolsOpen = false;
            const threshold = 160; 

            setInterval(function() {
                if (window.outerWidth - window.innerWidth > threshold || window.outerHeight - window.innerHeight > threshold) {
                    devtoolsOpen = true;
                }
                if (devtoolsOpen) {
                    alert("Developer tools are blocked. Reload the page if accidentally opened.");
                    window.location.href = 'about:blank'; 
                }
            }, 1000);
        })();

        document.addEventListener('contextmenu', event => event.preventDefault());

        document.addEventListener('dragstart', function(event) {
            if (event.target.tagName === 'IMG') {
                event.preventDefault();
            }
        });

        document.addEventListener('selectstart', function(event) {
            event.preventDefault();
        });

        window.onbeforeprint = function() {
            alert('Printing is disabled on this page.');
            return false; 
        };

        function checkPassword() {
            var password = document.getElementById("password").value;
            if (password === "CuPCaKEs337") {
                document.getElementById("loginOverlay").style.display = "none";
            } else {
                alert("Incorrect password");
            }
        }

        function loadImages() {
            var images = [
                { src: "https://simplyhaffz.github.io/337/Gallery/images/dln1.jpg", width: 240, height: 300 },
                { src: "https://simplyhaffz.github.io/337/Gallery/images/dln2.jpg", width: 240, height: 300 },
                { src: "https://simplyhaffz.github.io/337/Gallery/images/dln3.jpg", width: 240, height: 300 },
                { src: "https://simplyhaffz.github.io/337/Gallery/images/dln4.jpg", width: 240, height: 300 },
                { src: "https://simplyhaffz.github.io/337/Gallery/images/dln5.jpg", width: 240, height: 300 },
                { src: "https://simplyhaffz.github.io/337/Gallery/images/dln6.jpg", class: "largeImage" },
                { src: "https://simplyhaffz.github.io/337/Gallery/images/dln7.jpg", class: "largeImage" },
                { src: "https://simplyhaffz.github.io/337/Gallery/images/dln8.jpg", width: 240, height: 300 }
            ];

            var container = document.getElementById("imageContainer");
            var secondRow = document.getElementById("secondRowContainer");
            var thirdRow = document.getElementById("singleImageRow");

            images.forEach(function(imageData, index) {
                var img = document.createElement("img");
                img.src = imageData.src;
                if (imageData.width && imageData.height) {
                    img.width = imageData.width;
                    img.height = imageData.height;
                }
                if (imageData.class) {
                    img.classList.add(imageData.class);
                }

                if (index < 5) {
                    container.appendChild(img);  // First row, 5 images
                } else if (index < 7) {
                    secondRow.appendChild(img);  // Second row, large images
                } else {
                    thirdRow.appendChild(img);  // Third row, one image (dln8)
                }
            });
        }

        window.onload = loadImages;
    </script>
</head>

<body oncontextmenu="return false;">
    <div id="loginOverlay">
        <div>
            <h2 style="color: white; font-size: 2rem; text-align: center;">Enter Password</h2>
            <input type="password" id="password" placeholder="Password" />
            <button onclick="checkPassword()">Submit</button>
        </div>
    </div>

    <div id="welcomeMessage">
        Welcome to the Beyond Dreams Doors Gallery!
    </div>

    <div id="imageContainer"></div> <!-- First row of 5 images -->

    <div id="secondRowContainer" class="secondRowContainer"></div> <!-- Second row of dln6 and dln7 -->

    <div id="singleImageRow" class="singleImageRow"></div> <!-- Third row with dln8 -->

    <footer>
        <center>
            <span id="copyright">(c) 2019-2024 Haffz. All Rights Reserved.</span><br>
            <span id="copyright">*In Collaboration with HASANAH55*</span><br>
        </center>
    </footer>
</body>

</html>
