<script> // Poem text
    const kiplingPoem = '<p>If you can <span>stand</span> with grace when storms surround you,  
    And <span>rise</span> when others stumble in the rain;  
    If you can <span>trust</span> yourself when doubts confound you,  
    Yet still <span>embrace</span> the wisdom they contain;  
    If you can <span>wait</span> and not lose faith in waiting,  
    Or hear deceit yet speak with honest breath,  
    Or face disdain without your soul <span>debating</span>,  
    And walk the line 'tween pride and humble depth;  
    If you can <span>dream</span>—yet not let dreams enslave you,  
    If you can <span>think</span>—yet not let thoughts confine,  
    If both <span>defeat</span> and <span>glory</span> do not shape you,  
    And through them both, you walk a path divine;  
    If you can hear your <span>truth</span> distorted, twisted,  
    <span>Turned</span> to bait for those who seek to snare,  
    Or see your work once whole now lying <span>splintered</span>,  
    And <span>build</span> it up again with patient care;  
    If you can take your <span>hopes</span> and dreams in fingers,  
    And <span>cast</span> them all upon a fleeting chance,  
    And <span>fall</span>, then rise again with strength that lingers,  
    And walk anew with steady, fearless stance;  
    If you can drive your heart and <span>spirit</span> forward,  
    When all around you whisper to give in,  
    And in the dark, when hope is but a whisper,  
    Let your <span>resolve</span> still whisper back: "Begin";  
    If you can <span>walk</span> with crowds and keep your honor,  
    Or stand with kings and yet remain the same,  
    If neither love nor hatred bends your center,  
    And praise and blame to you are but a name;  
    If you can seize each fleeting, golden moment,  
    And shape it with the hands of time and light,  
    The world is yours, with all its vast horizons,  
    And more—my son, you'll stand in noble might.</p>';

    
    // Function to insert poem into divs
    function insertPoemIntoDivs() {
        // Get all .text divs
        const textDivs = document.querySelectorAll(".text");
    
        // Insert poem into all .text divs
        textDivs.forEach((div) => {
            div.innerHTML = kiplingPoem;
        });
    }
    
    // Call the function when the DOM is fully loaded
    document.addEventListener("DOMContentLoaded", insertPoemIntoDivs);
    
    const contentDiv = document.querySelector(".content");
    function adjustContentSize() {
        const viewportWidth = window.innerWidth;
        const baseWidth = 1000;
        const scaleFactor =
            viewportWidth < baseWidth ? (viewportWidth / baseWidth) * 0.8 : 1;
        contentDiv.style.transform = `scale(${scaleFactor})`;
    }
    window.addEventListener("load", adjustContentSize);
    window.addEventListener("resize", adjustContentSize);
     </script>
