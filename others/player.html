<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    
    <!-- Include Swiper CSS -->
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
    <!-- Include Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <!-- CSS file -->
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600&display=swap");

        :root {
            --primary-clr: rgba(228, 228, 229, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Nunito", sans-serif;
        }

        body {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            width: 100%;
            background: url(https://i.pinimg.com/1200x/27/5b/bd/275bbd8891c6c7b1570c055c00b67f8c.jpg);
            background-repeat: no-repeat;
            background-size: cover;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(8px);
        }

        .album-cover {
            position: relative;
            width: 90%;
        }

        .current-album-cover {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            object-fit: cover;
            z-index: 10;
            opacity: 0.99;
            border: 4px solid rgba(255, 255, 255, 0.8);
            border-radius: 10px;
        }

        .swiper {
            width: 100%;
            padding: 40px 0 100px;
            overflow: hidden; /* Hide overflow */
        }

        .swiper-wrapper {
            display: flex; /* Use flexbox for horizontal layout */
            animation: marquee 20s linear infinite; /* Smooth marquee animation */
        }

        @keyframes marquee {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-100%);
            }
        }

        .swiper-slide {
            position: relative;
            max-width: 200px;
            aspect-ratio: 1/1;
            border-radius: 10px;
            opacity: 0.7;
            transition: opacity 0.3s;
            margin: 10px; /* Space between slides */
        }

        .swiper-slide:hover {
            opacity: 1;
        }

        .swiper-slide img {
            object-fit: cover;
            width: 100%;
            height: 100%;
            border-radius: inherit;
            pointer-events: none;
            user-select: none;
        }

        .music-player {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--primary-clr);
            width: 380px;
            padding: 10px 30px;
            border-radius: 20px;
            margin-top: 20px;
        }

        .music-player h1 {
            font-size: 1.5rem;
            font-weight: 600;
            line-height: 1.6;
        }

        .music-player p {
            font-size: 1rem;
            font-weight: 400;
            opacity: 0.6;
        }

        #progress {
            appearance: none;
            width: 100%;
            height: 7px;
            background: rgba(163, 162, 164, 0.4);
            border-radius: 4px;
            margin: 32px 0 24px;
            cursor: pointer;
        }

        #progress::-webkit-slider-thumb {
            appearance: none;
            background: rgba(163, 162, 164, 0.9);
            width: 16px;
            border-radius: 50%;
            outline: 4px solid var(--primary-clr);
            box-shadow: 0 6px 10px rgba(5, 36, 28, 0.3);
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .controls button {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            aspect-ratio: 1/1;
            margin: 20px;
            background: rgba(163, 162, 164, 0.3);
            color: var(--primary-clr);
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.3);
            outline: 0;
            font-size: 1.1rem;
            box-shadow: 0 10px 20px rgba(5, 36, 28, 0.3);
            cursor: pointer;
            transition: all 0.3s linear;
        }

        .controls button:is(:hover, :focus-visible) {
            transform: scale(0.96);
        }

        .controls button:nth-child(2) {
            transform: scale(1.3);
        }

        .controls button:nth-child(2):is(:hover, :focus-visible) {
            transform: scale(1.25);
        }
    </style>
</head>
<body>
    <div class="album-cover">
        <img id="albumCover" src="https://github.com/ecemgo/mini-samples-great-tricks/assets/13468728/d3ca28bf-e1b7-467e-a00b-c7785be8e397" alt="Album Cover" class="current-album-cover" />
        <div class="swiper">
            <div class="swiper-wrapper">
                <!-- Swiper slides with images and links -->
                <div class="swiper-slide">
                    <img src="https://github.com/ecemgo/mini-samples-great-tricks/assets/13468728/d3ca28bf-e1b7-467e-a00b-c7785be8e397" />
                    <div class="overlay">
                        <a href="https://www.youtube.com/watch?v=aatr_2MstrI&ab_channel=CleanBandit" target="_blank">
                            <ion-icon name="logo-youtube"></ion-icon>
                        </a>
                    </div>
                </div>
                <div class="swiper-slide">
                    <img src="https://github.com/ecemgo/mini-samples-great-tricks/assets/13468728/1afe4c6a-0287-43f0-9076-92f8be49d9dc" />
                    <div class="overlay">
                        <a href="https://www.youtube.com/watch?v=qEnfeG8uBRY&ab_channel=AliciaKeys-Topic" target="_blank">
                            <ion-icon name="logo-youtube"></ion-icon>
                        </a>
                    </div>
                </div>
                <div class="swiper-slide">
                    <img src="https://github.com/ecemgo/mini-samples-great-tricks/assets/13468728/abaa23bd-8c93-4219-a3ef-0d0cb6f12566" />
                    <div class="overlay">
                        <a href="https://www.youtube.com/watch?v=LgsaD-vNJ9M" target="_blank">
                            <ion-icon name="logo-youtube"></ion-icon>
                        </a>
                    </div>
                </div>
                <div class="swiper-slide">
                    <img src="https://github.com/ecemgo/mini-samples-great-tricks/assets/13468728/bd9bcc80-a9ab-4d54-a460-ffdb77f22a72" />
                    <div class="overlay">
                        <a href="https://www.youtube.com/watch?v=a5uQMwRMHcs&ab_channel=DaftPunkVEVO" target="_blank">
                            <ion-icon name="logo-youtube"></ion-icon>
                        </a>
                    </div>
                </div>
                <div class="swiper-slide">
                    <img src="https://github.com/ecemgo/mini-samples-great-tricks/assets/13468728/18bc2436-740b-44c4-9dd8-fd7be51a07ad" />
                    <div class="overlay">
                        <a href="https://www.youtube.com/watch?v=H5v3kku4y6Q&ab_channel=HarryStylesVEVO" target="_blank">
                            <ion-icon name="logo-youtube"></ion-icon>
                        </a>
                    </div>
                </div>
                <div class="swiper-slide">
                    <img src="https://github.com/ecemgo/mini-samples-great-tricks/assets/13468728/4c5c1727-8b32-48c1-91de-b0496ccf10f6" />
                    <div class="overlay">
                        <a href="https://www.youtube.com/watch?v=9HDEHj2yzew&ab_channel=DuaLipa" target="_blank">
                            <ion-icon name="logo-youtube"></ion-icon>
                        </a>
                    </div>
                </div>
                <div class="swiper-slide">
                    <img src="https://github.com/ecemgo/mini-samples-great-tricks/assets/13468728/23e440e5-a0fa-4a85-8175-bcc485a20ee6" />
                    <div class="overlay">
                        <a href="https://www.youtube.com/watch?v=tCXGJQYZ9JA&ab_channel=TaylorSwiftVEVO" target="_blank">
                            <ion-icon name="logo-youtube"></ion-icon>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="music-player">
        <h1 id="songTitle">Title</h1>
        <p id="artistName">Song Name</p>

        <audio id="song">
            <source src="https://github.com/ecemgo/mini-samples-great-tricks/raw/main/song-list/Daft-Punk-Instant-Crush.mp3" type="audio/mpeg" />
        </audio>

        <input type="range" value="0" id="progress" />

        <div class="controls">
            <button class="backward">
                <i class="fa-solid fa-backward"></i>
            </button>
            <button class="play-pause-btn">
                <i class="fa-solid fa-play" id="controlIcon"></i>
            </button>
            <button class="forward">
                <i class="fa-solid fa-forward"></i>
            </button>
        </div>
    </div>

    <!-- Include Swiper JS -->
    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    <script>
        const progress = document.getElementById("progress");
        const song = document.getElementById("song");
        const controlIcon = document.getElementById("controlIcon");
        const playPauseButton = document.querySelector(".play-pause-btn");
        const nextButton = document.querySelector(".controls button.forward");
        const prevButton = document.querySelector(".controls button.backward");
        const songTitle = document.getElementById("songTitle");
        const artistName = document.getElementById("artistName");

        const songs = [
            {
                title: "Symphony",
                artist: "Clean Bandit ft. Zara Larsson",
                source: "https://github.com/ecemgo/mini-samples-great-tricks/raw/main/song-list/Clean-Bandit-Symphony.mp3",
                image: "https://github.com/ecemgo/mini-samples-great-tricks/assets/13468728/d3ca28bf-e1b7-467e-a00b-c7785be8e397"
            },
            {
                title: "Pawn It All",
                artist: "Alicia Keys",
                source: "https://github.com/ecemgo/mini-samples-great-tricks/raw/main/song-list/Pawn-It-All.mp3",
                image: "https://github.com/ecemgo/mini-samples-great-tricks/assets/13468728/1afe4c6a-0287-43f0-9076-92f8be49d9dc"
            },
            {
                title: "Seni Dert Etmeler",
                artist: "Madrigal",
                source: "https://github.com/ecemgo/mini-samples-great-tricks/raw/main/song-list/Madrigal-Seni-Dert-Etmeler.mp3",
                image: "https://github.com/ecemgo/mini-samples-great-tricks/assets/13468728/abaa23bd-8c93-4219-a3ef-0d0cb6f12566"
            },
            {
                title: "Instant Crush",
                artist: "Daft Punk ft. Julian Casablancas",
                source: "https://github.com/ecemgo/mini-samples-great-tricks/raw/main/song-list/Daft-Punk-Instant-Crush.mp3",
                image: "https://github.com/ecemgo/mini-samples-great-tricks/assets/13468728/bd9bcc80-a9ab-4d54-a460-ffdb77f22a72"
            },
            {
                title: "As It Was",
                artist: "Harry Styles",
                source: "https://github.com/ecemgo/mini-samples-great-tricks/raw/main/song-list/Harry-Styles-As-It-Was.mp3",
                image: "https://github.com/ecemgo/mini-samples-great-tricks/assets/13468728/18bc2436-740b-44c4-9dd8-fd7be51a07ad"
            },
            {
                title: "Physical",
                artist: "Dua Lipa",
                source: "https://github.com/ecemgo/mini-samples-great-tricks/raw/main/song-list/Dua-Lipa-Physical.mp3",
                image: "https://github.com/ecemgo/mini-samples-great-tricks/assets/13468728/4c5c1727-8b32-48c1-91de-b0496ccf10f6"
            },
            {
                title: "Delicate",
                artist: "Taylor Swift",
                source: "https://github.com/ecemgo/mini-samples-great-tricks/raw/main/song-list/Taylor-Swift-Delicate.mp3",
                image: "https://github.com/ecemgo/mini-samples-great-tricks/assets/13468728/23e440e5-a0fa-4a85-8175-bcc485a20ee6"
            },
        ];

        let currentSongIndex = 0;

        function updateSongInfo() {
            const currentSong = songs[currentSongIndex];
            song.src = currentSong.source;
            songTitle.textContent = currentSong.title;
            artistName.textContent = currentSong.artist;
            song.load();
        }

        function togglePlayPause() {
            if (song.paused) {
                song.play();
                controlIcon.classList.remove("fa-play");
                controlIcon.classList.add("fa-pause");
            } else {
                song.pause();
                controlIcon.classList.remove("fa-pause");
                controlIcon.classList.add("fa-play");
            }
        }

        playPauseButton.addEventListener("click", togglePlayPause);
        nextButton.addEventListener("click", () => {
            currentSongIndex = (currentSongIndex + 1) % songs.length;
            updateSongInfo();
            togglePlayPause();
        });
        prevButton.addEventListener("click", () => {
            currentSongIndex = (currentSongIndex - 1 + songs.length) % songs.length;
            updateSongInfo();
            togglePlayPause();
        });

        song.addEventListener("timeupdate", () => {
            const progressValue = (song.currentTime / song.duration) * 100;
            progress.value = progressValue;
        });

        progress.addEventListener("input", () => {
            const seekTime = (progress.value / 100) * song.duration;
            song.currentTime = seekTime;
        });

        updateSongInfo();

        // Initialize Swiper
        const swiper = new Swiper('.swiper', {
            loop: true,
            autoplay: {
                delay: 3000,
                disableOnInteraction: false,
            },
            slidesPerView: 'auto',
            spaceBetween: 10,
        });
    </script>
</body>
</html>
